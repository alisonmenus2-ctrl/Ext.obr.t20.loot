<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Loot System</title>

  <style>
    body {
      font-family: Arial;
      padding: 10px;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    select {
      width: 100%;
      padding: 10px;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      margin-top: 10px;
      overflow: auto;
    }
  </style>
</head>

<body>

  <h2>Loot System</h2>

  <label>ND:</label>

  <select id="nd">
    <option value="1">ND 1</option>
    <option value="5">ND 5</option>
    <option value="10">ND 10</option>
  </select>

  <button onclick="roll()">🎲 Rolar Loot</button>

  <pre id="out">Aguardando...</pre>

  <script>

    const SUPABASE_URL =
      "https://hrctstocfkjwshmzbozb.supabase.co";
    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyY3RzdG9jZmtqd3NobXpib3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTk4ODQsImV4cCI6MjA5MzU5NTg4NH0.tcW882jTtTTM_9q1F5Iu0GG-CVsflYc9Z9P2TCK6BRU";
  
    async function roll() {

      const nd =
        parseInt(document.getElementById("nd").value);

      try {

        const res = await fetch(
          SUPABASE_URL + "/rest/v1/rpc/generate_loot",
          {
            method: "POST",

            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              command_name: "obr_loot",
              p_nd: nd
            })
          }
        );

        const data = await res.json();

        document.getElementById("out").innerText =
          JSON.stringify(data, null, 2);

      } catch (err) {

        document.getElementById("out").innerText =
          err;

      }

    }

  </script>

</body>

</html>
